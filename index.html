<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elite do Lucro - Links Oficiais</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #010409;
            color: #e6edf3;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: #010409;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fundo.png.PNG');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .content {
            z-index: 10;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: auto;
            margin-bottom: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 320px;
            padding: 18px 0;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: #010409;
            background: linear-gradient(180deg, #fcd34d 0%, #fbbf24 100%);
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-icon {
            margin-right: 12px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="background-image"></div>

        <div class="content">
            <a href="https://trade.polariumbroker.com/register?aff=433880&aff_model=revenue&afftrack=" target="_blank" class="btn">
                <span class="btn-icon">💎</span> CADASTRAR NA CORRETORA
            </a>

            <a href="https://t.me/elitedolucroo" target="_blank" class="btn">
                <span class="btn-icon">🚀</span> ENTRAR NO TELEGRAM
            </a>
        </div>
    </div>

</body>
</html>
